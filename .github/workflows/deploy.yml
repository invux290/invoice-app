name: Deploy InvoiceKit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Trigger Render deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" > /dev/null
            echo "Render deploy triggered."
          else
            echo "No RENDER_DEPLOY_HOOK secret set. Render auto-deploys from GitHub push."
          fi